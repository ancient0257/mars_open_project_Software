services:
  - type: web
    name: campus-mcp-library
    env: node
    rootDir: mcp-servers/library
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 3001

  - type: web
    name: campus-mcp-cafeteria
    env: node
    rootDir: mcp-servers/cafeteria
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 3002

  - type: web
    name: campus-mcp-events
    env: node
    rootDir: mcp-servers/events
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 3003

  - type: web
    name: campus-mcp-academics
    env: node
    rootDir: mcp-servers/academics
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 3004

  - type: web
    name: campus-intel-frontend
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DEEPSEEK_API_KEY
        value: sk-177a438c90154ddaa005c1a3839b73c9
      - key: LIBRARY_MCP_URL
        value: https://campus-mcp-library.onrender.com
      - key: CAFETERIA_MCP_URL
        value: https://campus-mcp-cafeteria.onrender.com
      - key: EVENTS_MCP_URL
        value: https://campus-mcp-events.onrender.com
      - key: ACADEMICS_MCP_URL
        value: https://campus-mcp-academics.onrender.com
